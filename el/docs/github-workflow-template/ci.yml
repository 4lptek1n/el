name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Demo suite (offline)
        run: |
          bash ./scripts/run_demos.sh > demo_report.json
          python -c "import json, sys; r=json.load(open('demo_report.json')); bad=[d for d in r['demos'] if d['status']!='ok' and d['status']!='skipped']; print(r); sys.exit(0 if not bad else 1)"
